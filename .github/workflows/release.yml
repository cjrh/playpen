name: Release

# Runs when `cargo release` pushes a bare-version tag (e.g. 0.3.1). Creates a
# GitHub release for the tag, then builds a binary for each supported Linux
# target and uploads them as assets on that release.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

# Both jobs create/modify the release, which needs write access to contents.
permissions:
  contents: write

jobs:
  # `upload-rust-binary-action` only uploads to an existing release, so the
  # release must be created first. `gh release create` makes one for the
  # pushed tag; the `view` guard keeps re-runs from failing on an existing
  # release.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$REPO" --title "$TAG" --generate-notes

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Sets up linkers / runners so a plain `cargo build` cross-compiles the
      # musl and aarch64 targets.
      - uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      # Builds in release mode, packages `playpen-<target>.tar.gz` (binary at
      # the archive root) plus a .sha256 checksum, and uploads both to the
      # release created by the `create-release` job.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: playpen
          target: ${{ matrix.target }}
          archive: $bin-$target
          tar: unix
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
